api_version = "2026-04"

[[extensions]]
name = "B2B Preis Rabatt"
handle = "b2b-preis-rabatt"
type = "function"
description = "Setzt für B2B-Kunden (B2B1/B2B2/B2B3) den individuellen Netto-Preis aus dem Metafeld."

[extensions.build]
command = "node -e \"process.exit(0)\""
path = "dist/index.wasm"
watch = ["src/**"]

[[extensions.targeting]]
target = "purchase.product-discount.run"
input_query = "src/run.graphql"
export = "run"
