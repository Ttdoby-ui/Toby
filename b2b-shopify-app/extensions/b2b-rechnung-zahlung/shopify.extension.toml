api_version = "2024-07"

[[extensions]]
name = "B2B Rechnung Zahlung"
handle = "b2b-rechnung-zahlung"
type = "function"
description = "Zeigt 'Rechnung' nur für B2B-Kunden (B2B1/B2B2/B2B3) an und setzt sie an Position 1."

[extensions.build]
command = "npx --yes @shopify/shopify_function@latest build -i src/run.js -o dist/index.wasm"
path = "dist/index.wasm"
watch = ["src/**"]

[[extensions.targeting]]
target = "purchase.payment-customization.run"
input_query = "src/run.graphql"
export = "run"
