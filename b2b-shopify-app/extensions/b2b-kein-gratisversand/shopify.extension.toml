api_version = "2024-07"

[[extensions]]
name = "B2B Kein Gratisversand"
handle = "b2b-kein-gratisversand"
type = "function"
description = "Blendet kostenlose Versandoptionen für B2B-Kunden (B2B1/B2B2/B2B3) aus."

[extensions.build]
command = "npx --yes @shopify/shopify_function@latest build -i src/run.js -o dist/index.wasm"
path = "dist/index.wasm"
watch = ["src/**"]

[[extensions.targeting]]
target = "purchase.delivery-customization.run"
input_query = "src/run.graphql"
export = "run"
