name: Deploy VIP Discount Function

on:
  push:
    branches:
      - main
      - claude/vip-discount-deployment-ugv32f
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install extension dependencies
        working-directory: vip-discount-function/extensions/vip-belage
        run: npm install

      - name: Run tests
        working-directory: vip-discount-function/extensions/vip-belage
        run: npm test

  deploy:
    name: Deploy to Shopify
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Diagnose Partners API token
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_PARTNERS_TOKEN }}
        run: |
          echo "--- Testing Partners API token validity ---"
          curl -s -X POST https://partners.shopify.com/api/2024-10/graphql.json \
            -H "X-Shopify-Access-Token: ${SHOPIFY_CLI_PARTNERS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ publicApiVersions { handle } }"}' | \
            node -e "
              let d='';
              process.stdin.on('data', c => d += c);
              process.stdin.on('end', () => {
                try {
                  const r = JSON.parse(d);
                  if (r.errors) {
                    console.log('Partners API ERROR:', JSON.stringify(r.errors));
                    process.exit(1);
                  } else {
                    console.log('Partners API: Token VALID');
                    console.log('Available versions:', r.data?.publicApiVersions?.map(v=>v.handle).join(', '));
                  }
                } catch(e) {
                  console.log('Unexpected response:', d.substring(0,300));
                  process.exit(1);
                }
              });
            "

      - name: Install extension dependencies
        working-directory: vip-discount-function/extensions/vip-belage
        run: npm install

      - name: Deploy function to Shopify
        working-directory: vip-discount-function
        env:
          CI: "1"
          SHOPIFY_CLI_TTY: "0"
          SHOPIFY_CLI_NO_ANALYTICS: "1"
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_PARTNERS_TOKEN }}
        run: |
          shopify app deploy \
            --client-id "${{ secrets.VIP_DISCOUNT_SHOPIFY_API_KEY }}" \
            --force \
            --no-release
