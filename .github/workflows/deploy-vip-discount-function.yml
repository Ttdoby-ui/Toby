name: Deploy VIP Discount Function

on:
  push:
    branches:
      - main
      - claude/shopify-adhesive-service-vkfNR
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Shopify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Shopify CLI 3.x
        run: npm install -g @shopify/cli@3.58.2 @shopify/app@3.58.2

      - name: Install extension dependencies
        working-directory: vip-discount-function/extensions/vip-belage
        run: npm install

      - name: Run tests
        working-directory: vip-discount-function/extensions/vip-belage
        run: npm test

      - name: Deploy function to Shopify
        working-directory: vip-discount-function
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_PARTNERS_TOKEN }}
          SHOPIFY_FLAG_CLIENT_ID: ${{ secrets.VIP_DISCOUNT_SHOPIFY_API_KEY }}
        run: echo "" | shopify app deploy --client-id ${{ secrets.VIP_DISCOUNT_SHOPIFY_API_KEY }}
