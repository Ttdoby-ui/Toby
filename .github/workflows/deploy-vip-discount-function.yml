name: Test Discount Function

# Führt die Unit-Tests der Kollektionsrabatt-Function aus.
# Das eigentliche Deployment läuft per `shopify app deploy` vom Rechner
# (Browser-Login), nicht über CI — der CI-Token funktioniert dafür nicht.

on:
  push:
    branches:
      - main
      - claude/shopify-adhesive-service-vkfNR
  workflow_dispatch:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Kollektionsrabatt dependencies
        working-directory: vip-discount-function/extensions/kollektionsrabatt
        run: npm install

      - name: Run Kollektionsrabatt tests
        working-directory: vip-discount-function/extensions/kollektionsrabatt
        run: npm test
