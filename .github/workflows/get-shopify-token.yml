name: Get Shopify Access Token (einmalig)

on:
  workflow_dispatch:
    inputs:
      oauth_code:
        description: 'OAuth code aus webhook.site (URL-Parameter code=...)\''
        required: true
        type: string

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Token holen
        env:
          CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          OAUTH_CODE: ${{ inputs.oauth_code }}
        run: |
          RESPONSE=$(curl -s -X POST https://e7ee88-2.myshopify.com/admin/oauth/access_token \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"5f9e6ea601cb2fdfdea0fd05b242a23d\",\"client_secret\":\"${CLIENT_SECRET}\",\"code\":\"${OAUTH_CODE}\"}")
          echo "=== DEIN ACCESS TOKEN ==="
          echo "$RESPONSE"
          echo "========================"
