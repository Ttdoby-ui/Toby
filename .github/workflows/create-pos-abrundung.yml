name: POS-Abrundung anlegen

# Legt den automatischen "POS-Abrundung"-Rabatt (Order-Discount, nur POS) an.
# WICHTIG: Zuerst muss die Function "POS-Abrundung (10 Cent)" per
# `shopify app deploy` (vom PC) deployt und die App auf dem Store installiert
# sein. Dann diesen Workflow: Actions -> "POS-Abrundung anlegen" -> Run workflow.
#
# Benoetigte Secrets (App "VIP Belaege Discount"):
#   VIP_DISCOUNT_SHOPIFY_API_KEY     Client-ID der App
#   VIP_DISCOUNT_SHOPIFY_API_SECRET  Client-Secret der App
#   SHOPIFY_STORE_DOMAIN             (optional) z. B. e7ee88-2.myshopify.com

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Anzeigename des Rabatts"
        required: false
        default: "POS-Abrundung"
      function_id:
        description: "Optional: Function-ID (leer = automatisch ueber Titel finden)"
        required: false
        default: ""

jobs:
  create:
    name: Rabatt anlegen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: claude/shopify-adhesive-service-vkfNR

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: POS-Abrundung anlegen
        working-directory: vip-discount-function
        env:
          STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN || 'e7ee88-2.myshopify.com' }}
          CLIENT_ID: ${{ secrets.VIP_DISCOUNT_SHOPIFY_API_KEY }}
          CLIENT_SECRET: ${{ secrets.VIP_DISCOUNT_SHOPIFY_API_SECRET }}
          TITLE: ${{ inputs.title }}
          FUNCTION_ID: ${{ inputs.function_id }}
        run: node scripts/create-pos-abrundung.mjs
