name: Backup-Artefakt dumpen

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run-ID, aus dem das whiten-backup Artefakt geladen wird"
        required: true

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: whiten-backup
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Dump
        run: |
          echo "===BACKUP-START==="
          cat whiten-backup.json
          echo ""
          echo "===BACKUP-END==="
