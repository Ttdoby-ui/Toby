name: Rabatte kombinierbar machen

# Setzt combinesWith.productDiscounts=true auf den Function-Mengenrabatten
# (Belaege/Textilien), damit sie mit den nativen VIP-Rabatten im selben
# Warenkorb kombinieren. Unter "Actions" -> "Rabatte kombinierbar machen"
# -> "Run workflow".
#
# Benoetigte Secrets (App "VIP Belaege Discount"):
#   VIP_DISCOUNT_SHOPIFY_API_KEY     Client-ID der App
#   VIP_DISCOUNT_SHOPIFY_API_SECRET  Client-Secret der App
#   SHOPIFY_STORE_DOMAIN             (optional) z. B. e7ee88-2.myshopify.com

on:
  workflow_dispatch:
    inputs:
      discount_ids:
        description: "Optional: kommagetrennte DiscountAutomaticNode-GIDs (leer = Belaege + Textilien)"
        required: false
        default: ""

jobs:
  update:
    name: combinesWith setzen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: claude/shopify-adhesive-service-vkfNR

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: combinesWith setzen
        working-directory: vip-discount-function
        env:
          STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN || 'e7ee88-2.myshopify.com' }}
          CLIENT_ID: ${{ secrets.VIP_DISCOUNT_SHOPIFY_API_KEY }}
          CLIENT_SECRET: ${{ secrets.VIP_DISCOUNT_SHOPIFY_API_SECRET }}
          DISCOUNT_IDS: ${{ inputs.discount_ids }}
        run: node scripts/set-combines-with.mjs
