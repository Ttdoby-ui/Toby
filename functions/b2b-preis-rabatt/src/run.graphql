query Input {
  cart {
    buyerIdentity {
      customer {
        # Nur für freigeschaltete Händler aktiv
        hasAnyTag(tags: ["b2b"])
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            # Netto-B2B-Preis pro Produkt
            metafield(namespace: "custom", key: "preis_b2b") {
              value
            }
          }
        }
      }
    }
  }
}
