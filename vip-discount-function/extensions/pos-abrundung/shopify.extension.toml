api_version = "2025-10"

[[extensions]]
name = "POS-Abrundung (10 Cent)"
handle = "pos-abrundung"
type = "function"

[[extensions.targeting]]
target = "cart.lines.discounts.generate.run"
input_query = "src/run.graphql"
export = "run"

[extensions.build]
path = "dist/function.wasm"
# Reines JS ohne generierte Typen -> typegen no-op (sonst laeuft graphql-codegen
# und scheitert mangels Codegen-Konfig). Der Build buendelt + javy danach normal.
typegen_command = "node --version"
