query Input {
  # Gesetzt, wenn der Checkout im Ladengeschaeft (Shopify POS) stattfindet.
  # Ab API-Version 2025-07 verfuegbar -> Abrundung greift NUR im POS.
  retailLocation {
    id
  }
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
  }
  discount {
    discountClasses
  }
}
