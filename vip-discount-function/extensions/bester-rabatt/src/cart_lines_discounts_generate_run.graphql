query CartInput {
  cart {
    buyerIdentity {
      customer {
        hasTags(tags: ["VIP1", "VIP2", "VIP3"]) {
          tag
          hasTag
        }
        sonderrabatte: metafield(namespace: "futurespin", key: "sonderrabatte") {
          jsonValue
        }
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
        compareAtAmountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          sku
          product {
            handle
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(key: "function-configuration") {
      jsonValue
    }
  }
}
