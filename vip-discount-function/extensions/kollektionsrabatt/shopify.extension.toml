api_version = "2025-01"

[[extensions]]
name = "Kollektionsrabatt (Mengenstaffel)"
handle = "kollektionsrabatt"
type = "function"

[[extensions.targeting]]
target = "purchase.product-discount.run"
input_query = "src/run.graphql"
export = "run"

[extensions.build]
path = "dist/function.wasm"
# Reines JS ohne generierte Typen → typegen no-op (sonst läuft graphql-codegen
# und scheitert mangels Codegen-Konfig). Der Build bündelt + javy danach normal.
typegen_command = "node --version"

# Bindet das Konfigurations-Metafeld an die Input-Query.
# Die JSON-Felder `collectionIds` und `vipTags` werden so zu den
# Query-Variablen $collectionIds und $vipTags.
[extensions.input.variables]
namespace = "kollektionsrabatt"
key = "config"
