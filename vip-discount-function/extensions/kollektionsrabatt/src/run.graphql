query Input($collectionIds: [ID!], $vipTags: [String!]) {
  cart {
    # Gesetzt, wenn der Checkout im Ladengeschaeft (Shopify POS) stattfindet.
    # ACHTUNG: Feld liegt auf Cart, NICHT auf der Input-Root (gegen
    # schema.graphql verifiziert, 2026-07-04) -> POS-Ausschluss des Rabatts.
    retailLocation {
      id
    }
    buyerIdentity {
      customer {
        hasTags(tags: $vipTags) {
          tag
          hasTag
        }
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
        compareAtAmountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            inAnyCollection(ids: $collectionIds)
            isVip: hasAnyTag(tags: ["for_vip"])
            noVolume: hasAnyTag(tags: ["kein_mengenrabatt"])
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "kollektionsrabatt", key: "config") {
      jsonValue
    }
  }
}
