query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
    }
  }
  discounts {
    discountProposals {
      handle
      targets {
        cartLineId
        quantity
      }
      value {
        __typename
        ... on Percentage {
          value
        }
        ... on FixedAmount {
          amount
          appliesToEachItem
        }
      }
    }
  }
}
